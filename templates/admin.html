<h3>Subir video</h3>

<form action="/upload" method="POST" enctype="multipart/form-data">
  <input type="file" name="video" required>
  <button type="submit">Subir</button>
</form>

<hr>

<h3>Videos:</h3>

{% for video in videos %}
  <video width="300" controls>
    <source src="{{ url_for('static', filename='videos/' + video) }}">
  </video>
{% endfor %}
